{% extends 'base.html' %}

{% block content %}
  <h2>Borrow Book: {{ book.name }}</h2>
  <p>Author: {{ book.author }}</p>
  <p>Published: {{ book.published_year }}</p>

  <form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-primary">Borrow Book</button>
  </form>
{% endblock %}
